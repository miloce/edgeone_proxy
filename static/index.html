<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代理万物</title>
  <link rel="icon" type="image/png" href="https://s2.hdslb.com/bfs/openplatform/1682b11880f5c53171217a03c8adc9f2e2a27fcf.png@100w.webp">
  <meta name="description" content="一个基于 EdgeOne Pages 的代理服务。">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f7f9;
      color: #222;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .panel {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
    }
    p {
      margin: 8px 0 18px;
      color: #666;
      font-size: 14px;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #1f6feb;
    }
    button {
      margin-top: 12px;
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #1f6feb;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #1857bb; }
    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>代理万物</h1>
      <p>输入目标网址，点击开始代理。</p>
      <form id="urlForm" onsubmit="redirectToProxy(event)">
        <input type="text" id="targetUrl" required placeholder="请输入目标网址，例如 https://example.com">
        <button type="submit">开始代理</button>
      </form>
      <div class="footer">Powered by EdgeOne Pages</div>
    </section>
  </main>

  <script>
    function redirectToProxy(event) {
      event.preventDefault();
      const targetUrl = document.getElementById('targetUrl').value.trim();
      if (!targetUrl) return;
      const proxyUrl = window.location.origin + '/proxy?url=' + encodeURIComponent(targetUrl);
      window.open(proxyUrl, '_blank');
    }
  </script>
</body>
</html>
